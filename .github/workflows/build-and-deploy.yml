name: Build and Publish MCP Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: mcp-servers
            context: servers
            dockerfile: servers/Dockerfile
          - name: mcp-gateway-registry
            context: mcp-gateway-registry
            dockerfile: mcp-gateway-registry/docker/Dockerfile.registry
          - name: mcp-gateway-auth
            context: mcp-gateway-registry
            dockerfile: mcp-gateway-registry/docker/Dockerfile.auth
          - name: mcp-gateway-metrics
            context: mcp-gateway-registry/metrics-service
            dockerfile: mcp-gateway-registry/metrics-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/digows/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
