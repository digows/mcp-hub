[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:freqtrade-mcp-server]
command=node /app/servers/freqtrade-mcp-server/build/index.js
directory=/app/servers/freqtrade-mcp-server
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=PORT="3001"
